{% extends 'base.html' %}
{% block content %}
<h3 style="color:#eef3ff;">Избранное</h3>
{% if products %}
<div class="row row-cols-2 row-cols-md-4 g-3">
    {% for p in products %}
    <div class="col">
        <div class="card bg-card">
            <div class="img-wrap" style="background:#0a0f24; border-radius:10px; height:180px; display:flex; align-items:center; justify-content:center; overflow:hidden;">
                <img src="{{ p.image_url }}" alt="{{ p.name }}" style="max-width:100%; max-height:100%; object-fit:contain;">
            </div>
            <div class="card-body">
                <h6>{{ p.name }}</h6>
                <p class="fw-bold" style="color:#8bb5ff;">{{ "%.2f"|format(p.price) }} ₽</p>
                <div class="d-flex gap-2">
                    <a href="{{ url_for('product', product_id=p.id) }}" class="btn btn-sm btn-outline-info">Подробнее</a>
                    <a href="{{ url_for('remove_from_favorites', product_id=p.id) }}" class="btn btn-sm btn-outline-danger">Удалить</a>
                </div>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% else %}
<div style="color:#8895c9; padding:40px; text-align:center;">
    <p style="font-size:1.2rem;">🤍 Список избранного пуст</p>
    <a href="{{ url_for('catalog') }}" class="btn btn-outline-info mt-3">Перейти в каталог</a>
</div>
{% endif %}
{% endblock %}
