<div class="col">
    <div class="card bg-card h-100">
        <div class="img-wrap" style="background:#0a0f24; border-radius:10px; height:180px; display:flex; align-items:center; justify-content:center; overflow:hidden;">
            <img src="{{ p.image_url }}" alt="{{ p.name }}" style="max-width:100%; max-height:100%; object-fit:contain;">
        </div>
        <div class="card-body d-flex flex-column">
            <h6 class="card-title">{{ p.name }}</h6>
            <p class="card-text fw-bold" style="color:#8bb5ff; font-size:1.2rem;">{{ "%.2f"|format(p.price) }} ₽</p>
            <div class="mt-auto d-flex gap-2 flex-wrap">
                <a href="{{ url_for('add_to_cart', product_id=p.id) }}" class="btn btn-sm btn-outline-light">В корзину</a>
                <a href="{{ url_for('add_to_compare', product_id=p.id) }}" class="btn btn-sm btn-outline-primary" title="Сравнить"><i class="bi bi-arrow-left-right"></i></a>
                <a href="{{ url_for('add_to_favorites', product_id=p.id) }}" class="btn btn-sm btn-outline-danger" title="В избранное"><i class="bi bi-heart"></i></a>
                <a href="{{ url_for('product', product_id=p.id) }}" class="btn btn-sm btn-outline-info">Подробнее</a>
            </div>
        </div>
    </div>
</div>
