{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-4">
        <div style="background:var(--bg-card); border:1px solid var(--border-hover); border-radius:16px; padding:30px;">
            <h3 class="mb-3" style="color:#eef3ff;">Вход</h3>
            <form method="POST">
                <div class="mb-3">
                    <label>Email</label>
                    <input type="email" name="email" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label>Пароль</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100" style="background:var(--accent); border:none; padding:10px;">Войти</button>
            </form>
            <p class="mt-3" style="color:#8895c9;">Нет аккаунта? <a href="{{ url_for('register') }}" style="color:#5b8def;">Зарегистрируйтесь</a></p>
        </div>
    </div>
</div>
{% endblock %}
